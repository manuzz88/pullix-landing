<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagina non trovata — pullix.fit</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#0F1114">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .nf {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      background: var(--dark); padding: 24px;
    }
    .nf-code {
      font-family: var(--d); font-weight: 700;
      font-size: clamp(90px, 24vw, 180px); line-height: 1;
      letter-spacing: -0.05em; color: var(--white);
    }
    .nf-code span { color: var(--volt); }
    .nf h1 {
      font-family: var(--d); font-weight: 600;
      font-size: clamp(18px, 4vw, 24px); letter-spacing: -0.02em;
      margin: 16px 0 8px; color: var(--white);
    }
    .nf p { font-size: 14.5px; color: var(--gray); margin-bottom: 32px; }
    .nf .btn-primary { font-size: 14px; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf-code">4<span>0</span>4</div>
    <h1>Questa pagina non esiste.</h1>
    <p>Page not found — ma la palestra è sempre al suo posto.</p>
    <a class="btn-primary" href="/">
      Torna alla home
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </main>
</body>
</html>
